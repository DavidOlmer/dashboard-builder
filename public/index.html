<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1419;
      --surface: #1a1f26;
      --surface-alt: #242b35;
      --border: #2d3640;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app { display: flex; height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    
    /* Widgets Palette */
    .widget-types {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .widget-type {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: grab;
      text-align: center;
      transition: all 0.15s;
    }
    .widget-type:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .widget-type .icon { font-size: 24px; margin-bottom: 4px; }
    .widget-type .label { font-size: 11px; color: var(--text-muted); }
    
    /* Dashboard List */
    .dashboard-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .dashboard-item {
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    .dashboard-item:hover { background: var(--surface-alt); }
    .dashboard-item.active { background: var(--accent); color: #000; }
    .dashboard-item .name { font-weight: 500; }
    .dashboard-item .meta { font-size: 11px; opacity: 0.7; }
    
    /* Main Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar input {
      flex: 1;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
    }
    .toolbar input:focus { outline: none; border-color: var(--accent); }
    .btn {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    
    /* Canvas */
    .canvas-container {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    .canvas {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      min-height: 600px;
      position: relative;
    }
    .canvas.drag-over { background: rgba(88, 166, 255, 0.05); }
    
    /* Widgets on Canvas */
    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      min-height: 120px;
      display: flex;
      flex-direction: column;
    }
    .widget:hover { border-color: var(--accent); }
    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .widget-title {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .widget-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .widget:hover .widget-actions { opacity: 1; }
    .widget-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
    }
    .widget-actions button:hover { color: var(--text); }
    .widget-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Widget Styles */
    .counter-value {
      font-size: 42px;
      font-weight: 700;
      color: var(--accent);
    }
    .counter-suffix {
      font-size: 18px;
      color: var(--text-muted);
      margin-left: 4px;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .status-operational .status-dot { background: var(--success); }
    .status-degraded .status-dot { background: var(--warning); }
    .status-maintenance .status-dot { background: var(--warning); }
    .status-offline .status-dot { background: var(--danger); }
    
    .chart-container {
      width: 100%;
      height: 100%;
      min-height: 100px;
    }
    .chart-container svg {
      width: 100%;
      height: 100%;
    }
    .chart-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
    }
    .chart-area {
      fill: rgba(88, 166, 255, 0.1);
    }
    
    .data-table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    .data-table th {
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }
    .data-table td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }
    
    /* Config Panel */
    .config-panel {
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      display: none;
    }
    .config-panel.open { display: block; }
    .config-panel h3 {
      font-size: 14px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }
    
    /* Mode Toggle */
    .mode-toggle {
      display: flex;
      background: var(--surface-alt);
      border-radius: 6px;
      padding: 2px;
    }
    .mode-toggle button {
      background: none;
      border: none;
      padding: 6px 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
    }
    .mode-toggle button.active {
      background: var(--accent);
      color: #000;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>🏗️ Dashboard Builder</h1>
      </div>
      
      <div class="sidebar-section">
        <h3>Widget Types</h3>
        <div class="widget-types">
          <div class="widget-type" draggable="true" data-type="counter">
            <div class="icon">🔢</div>
            <div class="label">Counter</div>
          </div>
          <div class="widget-type" draggable="true" data-type="line-chart">
            <div class="icon">📈</div>
            <div class="label">Line Chart</div>
          </div>
          <div class="widget-type" draggable="true" data-type="table">
            <div class="icon">📊</div>
            <div class="label">Table</div>
          </div>
          <div class="widget-type" draggable="true" data-type="status-badge">
            <div class="icon">🚦</div>
            <div class="label">Status</div>
          </div>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>Dashboards</h3>
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 12px;" onclick="newDashboard()">
          + New Dashboard
        </button>
      </div>
      
      <div class="dashboard-list" id="dashboardList">
        <!-- Dashboard items loaded here -->
      </div>
    </aside>
    
    <main class="main">
      <div class="toolbar">
        <input type="text" id="dashboardName" placeholder="Dashboard name..." value="Untitled Dashboard">
        <div class="mode-toggle">
          <button class="active" data-mode="edit" onclick="setMode('edit')">Edit</button>
          <button data-mode="view" onclick="setMode('view')">View</button>
        </div>
        <button class="btn" onclick="saveDashboard()">💾 Save</button>
        <button class="btn" onclick="exportConfig()">📤 Export</button>
        <button class="btn btn-danger" onclick="deleteDashboard()">🗑️</button>
      </div>
      
      <div class="canvas-container">
        <div class="canvas" id="canvas">
          <div class="empty-state">
            <div class="icon">📦</div>
            <p>Drag widgets here to build your dashboard</p>
          </div>
        </div>
      </div>
    </main>
    
    <aside class="config-panel" id="configPanel">
      <h3>Widget Configuration</h3>
      <div id="configForm">
        <!-- Config form loaded here -->
      </div>
    </aside>
  </div>

  <script>
    // State
    let currentDashboard = null;
    let selectedWidget = null;
    let mode = 'edit';
    let queries = [];
    let refreshTimer = null;

    // API
    const api = {
      async get(path) {
        const res = await fetch(`/api${path}`);
        return res.json();
      },
      async post(path, data) {
        const res = await fetch(`/api${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        return res.json();
      },
      async put(path, data) {
        const res = await fetch(`/api${path}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        return res.json();
      },
      async delete(path) {
        const res = await fetch(`/api${path}`, { method: 'DELETE' });
        return res.json();
      }
    };

    // Initialize
    async function init() {
      queries = await api.get('/queries');
      await loadDashboardList();
      setupDragDrop();
      
      // Check for saved dashboard ID in URL
      const params = new URLSearchParams(location.search);
      if (params.get('id')) {
        await loadDashboard(params.get('id'));
      }
    }

    // Dashboard CRUD
    async function loadDashboardList() {
      const dashboards = await api.get('/dashboards');
      const list = document.getElementById('dashboardList');
      list.innerHTML = dashboards.map(d => `
        <div class="dashboard-item ${currentDashboard?.id === d.id ? 'active' : ''}" 
             onclick="loadDashboard('${d.id}')">
          <div class="name">${d.name}</div>
          <div class="meta">${new Date(d.updated).toLocaleDateString()}</div>
        </div>
      `).join('') || '<div class="dashboard-item"><div class="meta">No dashboards yet</div></div>';
    }

    async function loadDashboard(id) {
      currentDashboard = await api.get(`/dashboards/${id}`);
      document.getElementById('dashboardName').value = currentDashboard.name;
      renderCanvas();
      loadDashboardList();
      startRefresh();
    }

    function newDashboard() {
      currentDashboard = {
        id: null,
        name: 'Untitled Dashboard',
        description: '',
        widgets: [],
        layout: { columns: 12 },
        refreshInterval: 30000
      };
      document.getElementById('dashboardName').value = currentDashboard.name;
      renderCanvas();
      loadDashboardList();
    }

    async function saveDashboard() {
      if (!currentDashboard) {
        newDashboard();
      }
      currentDashboard.name = document.getElementById('dashboardName').value;
      
      if (currentDashboard.id) {
        currentDashboard = await api.put(`/dashboards/${currentDashboard.id}`, currentDashboard);
      } else {
        currentDashboard = await api.post('/dashboards', currentDashboard);
      }
      loadDashboardList();
      alert('Dashboard saved!');
    }

    async function deleteDashboard() {
      if (!currentDashboard?.id) return;
      if (!confirm('Delete this dashboard?')) return;
      
      await api.delete(`/dashboards/${currentDashboard.id}`);
      currentDashboard = null;
      renderCanvas();
      loadDashboardList();
    }

    function exportConfig() {
      if (!currentDashboard) return;
      const json = JSON.stringify(currentDashboard, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${currentDashboard.name.replace(/\s+/g, '-')}.json`;
      a.click();
    }

    // Canvas
    function renderCanvas() {
      const canvas = document.getElementById('canvas');
      
      if (!currentDashboard || currentDashboard.widgets.length === 0) {
        canvas.innerHTML = `
          <div class="empty-state">
            <div class="icon">📦</div>
            <p>Drag widgets here to build your dashboard</p>
          </div>
        `;
        return;
      }
      
      canvas.innerHTML = currentDashboard.widgets.map((w, i) => `
        <div class="widget" 
             data-index="${i}"
             style="grid-column: span ${w.position?.w || 4}; grid-row: span ${w.position?.h || 2};"
             onclick="selectWidget(${i})">
          <div class="widget-header">
            <span class="widget-title">${w.title || w.type}</span>
            ${mode === 'edit' ? `
              <div class="widget-actions">
                <button onclick="event.stopPropagation(); configureWidget(${i})">⚙️</button>
                <button onclick="event.stopPropagation(); removeWidget(${i})">×</button>
              </div>
            ` : ''}
          </div>
          <div class="widget-content" id="widget-${w.id}">
            <span style="color: var(--text-muted)">Loading...</span>
          </div>
        </div>
      `).join('');
      
      // Load data for each widget
      currentDashboard.widgets.forEach(loadWidgetData);
    }

    async function loadWidgetData(widget) {
      if (!widget.query) return;
      
      const container = document.getElementById(`widget-${widget.id}`);
      if (!container) return;
      
      try {
        const data = await api.get(`/data/${widget.query}`);
        renderWidgetContent(container, widget, data);
      } catch (e) {
        container.innerHTML = `<span style="color: var(--danger)">Error loading data</span>`;
      }
    }

    function renderWidgetContent(container, widget, data) {
      switch (widget.type) {
        case 'counter':
          container.innerHTML = `
            <div>
              <span class="counter-value">${formatNumber(data.value)}</span>
              <span class="counter-suffix">${data.suffix || widget.config?.suffix || ''}</span>
            </div>
          `;
          break;
          
        case 'status-badge':
          container.innerHTML = `
            <div class="status-badge status-${data.status}">
              <span class="status-dot"></span>
              ${data.status}
            </div>
          `;
          break;
          
        case 'line-chart':
          container.innerHTML = renderChart(data.series);
          break;
          
        case 'table':
          container.innerHTML = `
            <table class="data-table">
              <thead>
                <tr>${data.columns.map(c => `<th>${c}</th>`).join('')}</tr>
              </thead>
              <tbody>
                ${data.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}
              </tbody>
            </table>
          `;
          break;
      }
    }

    function renderChart(series) {
      const width = 300;
      const height = 100;
      const padding = 10;
      
      const values = series.map(d => d.value);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      
      const points = series.map((d, i) => {
        const x = padding + (i / (series.length - 1)) * (width - padding * 2);
        const y = height - padding - ((d.value - min) / range) * (height - padding * 2);
        return `${x},${y}`;
      });
      
      const linePath = `M ${points.join(' L ')}`;
      const areaPath = `M ${padding},${height - padding} L ${points.join(' L ')} L ${width - padding},${height - padding} Z`;
      
      return `
        <div class="chart-container">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
            <path class="chart-area" d="${areaPath}" />
            <path class="chart-line" d="${linePath}" />
          </svg>
        </div>
      `;
    }

    function formatNumber(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    // Widget Management
    function addWidget(type) {
      if (!currentDashboard) newDashboard();
      
      const widget = {
        id: `widget_${Date.now()}`,
        type,
        title: type.replace('-', ' ').replace(/\b\w/g, c => c.toUpperCase()),
        position: { x: 0, y: 0, w: type === 'table' ? 6 : 3, h: type === 'table' ? 3 : 2 },
        query: getDefaultQuery(type),
        config: {}
      };
      
      currentDashboard.widgets.push(widget);
      renderCanvas();
      configureWidget(currentDashboard.widgets.length - 1);
    }

    function getDefaultQuery(type) {
      const defaults = {
        'counter': 'paperclip.total',
        'line-chart': 'paperclip.history',
        'table': 'paperclip.by_type',
        'status-badge': 'paperclip.status'
      };
      return defaults[type] || null;
    }

    function removeWidget(index) {
      currentDashboard.widgets.splice(index, 1);
      renderCanvas();
      closeConfig();
    }

    function selectWidget(index) {
      selectedWidget = index;
    }

    function configureWidget(index) {
      selectedWidget = index;
      const widget = currentDashboard.widgets[index];
      const panel = document.getElementById('configPanel');
      const form = document.getElementById('configForm');
      
      const queryOptions = queries
        .filter(q => !widget.type.includes('chart') || q.type === 'timeseries')
        .filter(q => widget.type !== 'table' || q.type === 'table')
        .map(q => `<option value="${q.key}" ${widget.query === q.key ? 'selected' : ''}>${q.name}</option>`)
        .join('');
      
      form.innerHTML = `
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="cfgTitle" value="${widget.title}" onchange="updateWidgetConfig()">
        </div>
        <div class="form-group">
          <label>Query</label>
          <select id="cfgQuery" onchange="updateWidgetConfig()">
            <option value="">Select a query...</option>
            ${queryOptions}
          </select>
        </div>
        <div class="form-group">
          <label>Width (columns 1-12)</label>
          <input type="number" id="cfgWidth" min="1" max="12" value="${widget.position?.w || 3}" onchange="updateWidgetConfig()">
        </div>
        <div class="form-group">
          <label>Height (rows)</label>
          <input type="number" id="cfgHeight" min="1" max="6" value="${widget.position?.h || 2}" onchange="updateWidgetConfig()">
        </div>
        ${widget.type === 'counter' ? `
          <div class="form-group">
            <label>Suffix</label>
            <input type="text" id="cfgSuffix" value="${widget.config?.suffix || ''}" onchange="updateWidgetConfig()">
          </div>
        ` : ''}
        <button class="btn" style="width: 100%; margin-top: 12px;" onclick="closeConfig()">Done</button>
      `;
      
      panel.classList.add('open');
    }

    function updateWidgetConfig() {
      if (selectedWidget === null) return;
      const widget = currentDashboard.widgets[selectedWidget];
      
      widget.title = document.getElementById('cfgTitle')?.value || widget.title;
      widget.query = document.getElementById('cfgQuery')?.value || widget.query;
      widget.position.w = parseInt(document.getElementById('cfgWidth')?.value) || 3;
      widget.position.h = parseInt(document.getElementById('cfgHeight')?.value) || 2;
      
      if (widget.type === 'counter') {
        widget.config.suffix = document.getElementById('cfgSuffix')?.value || '';
      }
      
      renderCanvas();
    }

    function closeConfig() {
      document.getElementById('configPanel').classList.remove('open');
      selectedWidget = null;
    }

    // Mode
    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll('.mode-toggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
      renderCanvas();
    }

    // Refresh
    function startRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      if (!currentDashboard) return;
      
      refreshTimer = setInterval(() => {
        if (mode === 'view') {
          currentDashboard.widgets.forEach(loadWidgetData);
        }
      }, currentDashboard.refreshInterval || 30000);
    }

    // Drag & Drop
    function setupDragDrop() {
      const canvas = document.getElementById('canvas');
      
      document.querySelectorAll('.widget-type').forEach(el => {
        el.addEventListener('dragstart', e => {
          e.dataTransfer.setData('widget-type', el.dataset.type);
        });
      });
      
      canvas.addEventListener('dragover', e => {
        e.preventDefault();
        canvas.classList.add('drag-over');
      });
      
      canvas.addEventListener('dragleave', () => {
        canvas.classList.remove('drag-over');
      });
      
      canvas.addEventListener('drop', e => {
        e.preventDefault();
        canvas.classList.remove('drag-over');
        const type = e.dataTransfer.getData('widget-type');
        if (type) addWidget(type);
      });
    }

    // Start
    init();
  </script>
</body>
</html>
